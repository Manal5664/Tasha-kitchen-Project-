<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Utensils Mart</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#8B0000;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    overflow:hidden;
}

.splash{
    text-align:center;
    animation:fadeIn 1.5s ease;
}

.logo{
    width:170px;
    height:170px;
    border-radius:50%;
    background:#fff;
    display:flex;
    justify-content:center;
    align-items:center;
    margin:auto;
    box-shadow:0 0 35px rgba(255,255,255,.4);
    overflow:hidden;
}

.logo img{
    width:90%;
    height:90%;
    object-fit:contain;
}

h1{
    color:#fff;
    font-size:58px;
    margin-top:30px;
    text-shadow:0 0 15px rgba(255,255,255,.4);
}

p{
    color:#fff;
    font-size:24px;
    margin-top:10px;
    letter-spacing:1px;
}

.loader{
    width:350px;
    height:10px;
    background:rgba(255,255,255,.25);
    border-radius:50px;
    margin:40px auto 15px;
    overflow:hidden;
}

.bar{
    width:0%;
    height:100%;
    background:#fff;
    border-radius:50px;
    animation:loading 3s linear forwards;
}

.loading-text{
    color:#fff;
    font-size:22px;
    animation:blink 1s infinite;
}

@keyframes loading{
    0%{
        width:0%;
    }
    100%{
        width:100%;
    }
}

@keyframes blink{
    50%{
        opacity:.3;
    }
}

@keyframes fadeIn{
    from{
        opacity:0;
        transform:scale(.8);
    }
    to{
        opacity:1;
        transform:scale(1);
    }
}
</style>

</head>
<body>

<div class="splash">

<div class="logo">
<img src="./images/logo.png" alt="Logo">
</div>

<h1>Utensils Mart</h1>

<p>Smart Kitchen Appliances</p>

<div class="loader">
<div class="bar"></div>
</div>

<div class="loading-text">Loading...</div>

</div>

<script>
sessionStorage.setItem('utensilsMartLogoShown', 'true');
setTimeout(function(){
    window.location.href="index.html";
},3000);
</script>

</body>
</html>
